# A fully annotated workflow showing every available input.
# Inputs that don't apply to this scenario are commented out
# with an explanation of when they would be used instead.

name: GrillMyCode - OpenRouter - Minimax 2.7

on:
  workflow_dispatch:

jobs:
  question-generator:
    runs-on: ubuntu-latest
    permissions:
      contents: write # required to commit the output file back to the repo
      pull-requests: write # required to post the PR comment
      # models: read # required to call GitHub Models API
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # full history required for diff resolution

      - uses: NSCC-ITC-Assessment/GrillMyCode@main
        with:
          # ── Authentication ────────────────────────────────────────────────

          # GitHub token used for API access and as the GitHub Models credential.
          # The built-in token is sufficient for most setups; supply an instructor
          # PAT here if you need an account with a higher GitHub Models rate limit.
          github_token: ${{ secrets.GITHUB_TOKEN }}

          # ── AI Provider ───────────────────────────────────────────────────

          # Provider to use for question generation.
          # Supported values: github-models | openai | openrouter | azure-openai
          # Default if not supplied: "github-models" when GITHUB_TOKEN is provided.
          ai_provider: "openrouter"

          # Model identifier for the chosen provider.
          # GitHub Models: gpt-4o, gpt-4o-mini, Codestral-2501, Phi-4, mistral-medium-2505, cohere-command-a, etc.
          # OpenAI:        gpt-4o, gpt-4-turbo
          # Azure OpenAI:  your deployment name
          # OpenRouter:    depends on your configured providers and models
          ai_model: "minimax/minimax-m2.7"

          # API key for the provider. Leave empty when using github-models with
          # the built-in GITHUB_TOKEN. Required for openai and openrouter.
          # api_key: ${{ secrets.AI_API_KEY }}
          api_key: ${{ secrets.OPENROUTER }}

          # Full Azure OpenAI endpoint URL. Only required for azure-openai.
          # azure_endpoint: "https://my-resource.openai.azure.com/openai/deployments/my-deployment"

          # ── Question Generation ───────────────────────────────────────────

          # Number of comprehension questions to generate (1–50). Capped to 50.
          num_questions: "50"

          # Free-text context about the assignment or topic. Helps the AI produce
          # more relevant, targeted questions. Supports multi-line values.
          # additional_context: |
          #   Assignment 3 — Python list comprehensions and lambda functions.
          #   Focus questions on why the student made their design choices.
          additional_context: "
              The following is the assignment specification for a bug tracking application that students are tasked with creating. 
              Use this context to generate relevant comprehension questions that test the student's understanding of the requirements 
              and their implementation choices.

              Students are taking an advanced programming course (PROG2400) and are expected to demonstrate their ability to read and 
              interpret assignment specifications, design appropriate data structures (like linked lists), implement file I/O operations, 
              and apply sorting and searching algorithms without relying on library data structures. 
              The questions should probe their understanding of these concepts as they relate to the provided assignment specification.
              The questions should not be simplistic or syntax-focused; instead, they should encourage the student to reflect on their 
              design and implementation decisions in the context of the assignment requirements.
              The questions should encourage critical thinking about how the student has implemented the required features, 
              such as how they read and write to files, how they manage the linked list of bugs, and how they ensure their code meets 
              the specified requirements. Look for opportunities to ask about their design decisions, such as how they chose to represent 
              the bug data, how they implemented the sorting and searching functionalities, and how they handle edge cases (e.g., deleting a bug that doesn't exist).

              When asking questions about a particular function, include the entire function definition in the question, not just a snippet. 
              This allows the student to see the full context of their implementation and encourages them to think critically about how 
              their code meets the assignment requirements.
          
              The assignment specification is as follows:

              PROG2400 Supplementary Assignment — Bug Tracking Application

              Introduction
                Your task is to create the beginnings of a bug tracking application to demonstrate major concepts from the course.
                The application will maintain a list of bugs that are stored in a text file with the following format.

              Bug File Format
                <Bug ID#>|<Date Added>|<Brief Desc>|<Detailed Desc>|<Status>|<Severity>|<Comment>|<Comment>|…||

                Bug ID#: Bug Unique Identifier
                Date Added: The date the bug was created.
                Brief Desc.: A brief description of the bug.
                Detailed Desc.: A complete description of the bug.
                Status: One of four different statuses: (OPEN, CLOSED, IN PROGRESS, WAITING)
                Severity: One of four different severities: (LOW, MEDIUM, HIGH, CRITICAL)
                Comments: Zero or more comments on the bug.
                Notes:
                  • Each field is separated by a single pipe symbol. (|)
                  • The comment fields are optional. All others are mandatory.
                  • The entire record ends with a double pipe symbol. (||)
                Example:
                  BUG0001|04-19-2024|Sample Bug #1|This is bug number one.|OPEN|HIGH|comment 1|comment 2||
                  BUG0003|04-19-2024|Sample Bug #3|This is bug number three.|CLOSED|HIGH|Initial comment|Another comment||
                  BUG0004|04-19-2024|Sample Bug #1|This is bug number one.|OPEN|HIGH||
                  BUG0005|04-19-2024|Sample Bug #2|This is bug number two.|OPEN|LOW|Initial comment.|Second comment.||
                  BUG0006|04-19-2024|Sample Bug #3|This is bug number three.|CLOSED|HIGH|Initial comment|Another comment||
 
              Application Requirements
                1. Read all bugs stored in the file into a linked list on application start.
                2. Add five (5) new bugs with varying contents.
                3. Display the list of bugs ordered by bug id to the console.
                4. Delete one (1) bug based on its bug id # and re-display the list of bugs.
                5. Sort the bugs by status and re-display the list of bugs.
                6. Search the list of bugs for one, based on its id, and display the details of that bug.
                7. Write all bugs in the linked list to the file on application end.
                8. You cannot use library data structures (e.g. vector) to perform any functionality.
                9. You can use standard datatypes (e.g. string), and you are allowed to use code that was provided to you. "

          # ── File Filtering ────────────────────────────────────────────────

          # Comma-separated globs for files to include. Leave empty to assess
          # all non-excluded files.
          # include_patterns: "*.py,*.js,src/**"
          include_patterns: "**/*.cpp,**/*.h"

          # Comma-separated globs for files to exclude. Providing a value here
          # completely replaces the built-in default list (lock files, images,
          # build artefacts, etc.).
          # exclude_patterns: "node_modules/**,dist/**,**/*.min.js"

          # When true (default), .github/workflows/ files are excluded from the
          # diff. Set to "false" if the assignment involves writing workflow files
          # and you want those included in the assessment.
          exclude_workflow_files: "true"

          # When false (default), inline and block comments are stripped from the
          # submitted code before it is sent to the AI, ensuring questions focus
          # on the code logic rather than the student's annotations. Set to "true"
          # to preserve comments exactly as written.
          # keep_comments: "false"

          # ── Output & Delivery ─────────────────────────────────────────────

          # Basename of the assessment Markdown file. Always written to the
          # _assessment/ folder in the repository root and committed back.
          output_file: "grill-my-code-or-minimax-27.md"

          # Post the assessment as a comment on the pull request.
          # Disable if you only want the output file committed to the repo.
          post_pr_comment: "true"

          # Create a GitHub Issue containing the assessment questions.
          # Each run produces a distinct, searchable issue. Not needed here
          # because the PR comment already surfaces the questions to the student.
          # post_issue: "false"

          # Create a GitHub Discussion containing the assessment questions.
          # Requires Discussions to be enabled on the repository.
          # post_discussion: "false"

          # Discussion category to post into. Must already exist in the repo's
          # Discussions settings. Only relevant when post_discussion is "true".
          # discussion_category: "Assessments"

          # ── Commit Range ──────────────────────────────────────────────────

          # Pin the diff base to the repository's very first commit so that
          # GitHub Classroom starter/template files are excluded. Set to "false"
          # to use the PR base branch SHA as the diff base instead, which is
          # useful for multi-commit PR workflows where the starter code was
          # already on the base branch.
          skip_initial_commit: "true"

          # Comma-separated author names or email substrings to skip. Consecutive
          # leading commits (immediately after the base SHA) whose author matches
          # any entry are excluded from the diff. Set to '' to disable entirely.
          skip_committers: "github-classroom[bot],github-actions[bot]"

          # Manually override the base and head commit SHAs. Both must be set
          # together. Auto-detected from the event context when not provided.
          # base_sha: ""
          # head_sha: ""
